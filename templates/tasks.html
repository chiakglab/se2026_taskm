<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>タスク一覧</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <h1>タスク一覧</h1>

    <a href="/tasks/new">+ 新規追加</a>
    <a href="/staff">スタッフ管理</a>

    <table>
        <tr>
            <th>タスク</th>
            <th>担当者</th>
            <th>締切</th>
            <th>状態</th>
            <th></th>
        </tr>
        {% for task in tasks %}
        <tr {% if task[5] %}class="urgent"{% endif %}>
            <td>{{ task[1] }}</td>
            <td>{{ task[2] }}</td>
            <td>{{ task[3] }}</td>
            <td>
                <form action="/tasks/{{ task[0] }}/status" method="POST" style="display:inline">
                    <button type="submit">{{ task[4] }}</button>
                </form>
            </td>
            <td>
                <a href="/tasks/{{ task[0] }}/edit">編集</a>
                <form action="/tasks/{{ task[0] }}/delete" method="POST" style="display:inline">
                    <button type="submit">削除</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
